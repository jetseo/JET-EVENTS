<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JET-EVENTS 음악 플레이어</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<style>
:root{
  --bg:#0A0C10; --panel:#14171F; --panel2:#1C202B; --line:#262b38;
  --pink:#FF2E63; --gold:#FFC53D; --teal:#2DD4BF;
  --text:#F4F1EA; --dim:#8A8F9C;
  --art-size:38vmin; --art-spin-dur:12s;
  --lyr-size:22px; --lyr-y:72%;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Pretendard Variable',sans-serif;overflow:hidden;}

#vizCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

/* ===== auto-hide UI (터치 시 표시, 3초 후 숨김) ===== */
.ui{transition:opacity .5s, visibility .5s;}
body.ui-hidden .ui{opacity:0;visibility:hidden;pointer-events:none;}

/* ===== album art ===== */
#albumArt{
  position:fixed;left:50%;top:38%;z-index:1;
  width:var(--art-size);height:var(--art-size);
  transform:translate(-50%,-50%);
  background:var(--panel2) center/cover;
  border:2px solid var(--line);
  box-shadow:0 10px 50px rgba(0,0,0,.6);
  display:none;
}
#albumArt.show{display:block;}
#albumArt.shape-circle{border-radius:50%;}
#albumArt.shape-square{border-radius:14px;}
#albumArt.shape-lp{border-radius:50%;box-shadow:0 0 0 10px #111,0 0 0 12px #2a2a2a,0 10px 50px rgba(0,0,0,.7);}
#albumArt.shape-lp::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:repeating-radial-gradient(circle at center, rgba(255,255,255,.04) 0 2px, transparent 2px 5px);
  pointer-events:none;
}
#albumArt.shape-lp::after{
  content:'';position:absolute;left:50%;top:50%;width:16%;height:16%;
  transform:translate(-50%,-50%);border-radius:50%;
  background:#0A0C10;border:3px solid var(--gold);
}
#albumArt.spin{animation:artSpin var(--art-spin-dur) linear infinite;}
#albumArt.spin.paused{animation-play-state:paused;}
@keyframes artSpin{from{transform:translate(-50%,-50%) rotate(0);}to{transform:translate(-50%,-50%) rotate(360deg);}}
@media (prefers-reduced-motion:reduce){#albumArt.spin{animation:none;}}

/* ===== lyrics ===== */
#lyricsBox{
  position:fixed;left:50%;top:var(--lyr-y);transform:translate(-50%,-50%);
  z-index:1;width:min(90vw,720px);max-height:34vh;overflow-y:auto;
  text-align:center;font-size:var(--lyr-size);font-weight:700;line-height:1.7;
  color:var(--text);text-shadow:0 2px 12px rgba(0,0,0,.9);
  white-space:pre-wrap;display:none;padding:8px;
  scrollbar-width:none;
}
#lyricsBox::-webkit-scrollbar{display:none;}
#lyricsBox.show{display:block;}

/* ===== top bar ===== */
.topbar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;padding:12px 14px;gap:10px;}
.topbar h1{font-family:'Black Han Sans',sans-serif;font-size:18px;margin:0;letter-spacing:.5px;
  background:linear-gradient(90deg,var(--gold),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent;}
.topbar a{color:var(--dim);font-size:12px;text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:6px 11px;background:rgba(20,23,31,.7);}
.hamburger{margin-left:auto;background:rgba(20,23,31,.85);border:1px solid var(--line);border-radius:10px;
  width:44px;height:44px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;}
.hamburger span{display:block;width:20px;height:2px;background:var(--text);transition:.3s;}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.open span:nth-child(2){opacity:0;}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

/* ===== option rail ===== */
.option-rail{position:fixed;top:66px;right:12px;z-index:20;display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.opt-chip{background:rgba(20,23,31,.92);border:1px solid var(--line);color:var(--text);border-radius:999px;
  padding:10px 15px;font-size:13px;font-weight:700;cursor:pointer;transform:translateX(130%);opacity:0;
  transition:transform .35s cubic-bezier(.2,.9,.3,1.2),opacity .3s;}
.option-rail.show .opt-chip{transform:translateX(0);opacity:1;}
.opt-chip.active{border-color:var(--teal);color:var(--teal);}

/* ===== drawers ===== */
.drawer{position:fixed;top:66px;right:170px;bottom:110px;width:300px;z-index:19;
  background:rgba(20,23,31,.96);border:1px solid var(--line);border-radius:16px;padding:16px;
  transform:translateX(30px);opacity:0;pointer-events:none;transition:.3s;overflow-y:auto;}
.drawer.show{transform:translateX(0);opacity:1;pointer-events:auto;}
.drawer h3{margin:0 0 12px;font-size:14px;color:var(--gold);}
.drawer label{display:block;font-size:12px;color:var(--dim);margin:12px 0 4px;}
.eq-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.eq-grid button{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;
  padding:8px 4px;font-size:11px;cursor:pointer;}
.eq-grid button.sel{border-color:var(--pink);color:var(--pink);font-weight:700;}
.toggle-row{display:flex;gap:6px;flex-wrap:wrap;}
.toggle-row button{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;
  padding:8px 12px;font-size:12px;cursor:pointer;}
.toggle-row button.on{border-color:var(--teal);color:var(--teal);font-weight:700;}

/* ===== arrow sliders ===== */
.arrow-slider{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.arrow-slider button{background:var(--panel2);border:1px solid var(--line);color:var(--text);
  width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:13px;flex-shrink:0;}
.arrow-slider input[type=range]{flex:1;accent-color:var(--teal);min-width:0;}
.arrow-slider .reset{width:auto;padding:0 8px;font-size:11px;color:var(--dim);}
.slider-val{font-size:11px;color:var(--teal);min-width:38px;text-align:right;}

/* ===== player bar ===== */
.playerbar{position:fixed;left:0;right:0;bottom:0;z-index:10;background:rgba(10,12,16,.92);
  border-top:1px solid var(--line);padding:10px 14px;display:flex;align-items:center;gap:12px;
  backdrop-filter:blur(8px);flex-wrap:wrap;}
.jacket{width:50px;height:50px;border-radius:10px;background:var(--panel2) center/cover;flex-shrink:0;border:1px solid var(--line);}
.track-info{min-width:0;flex:0 1 auto;}
.track-info .t{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40vw;}
.track-info .a{font-size:12px;color:var(--dim);}
.controls{display:flex;align-items:center;gap:6px;}
.controls button{background:none;border:none;color:var(--text);font-size:19px;cursor:pointer;padding:6px;}
.controls .play{width:46px;height:46px;border-radius:50%;background:linear-gradient(90deg,var(--pink),#ff5c7a);
  font-size:17px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,46,99,.4);}
.progress-wrap{flex:1 1 160px;display:flex;align-items:center;gap:8px;min-width:140px;}
.progress-wrap span{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums;}
#seek{flex:1;accent-color:var(--pink);min-width:0;}
.vol-wrap{display:flex;align-items:center;gap:4px;}
#vol{width:76px;accent-color:var(--teal);}

/* ===== playlist ===== */
.playlist{position:fixed;left:12px;top:66px;bottom:110px;width:270px;z-index:18;
  background:rgba(20,23,31,.94);border:1px solid var(--line);border-radius:16px;padding:14px;
  display:flex;flex-direction:column;transition:transform .3s,opacity .3s;}
.playlist.hidden{transform:translateX(-115%);opacity:0;pointer-events:none;}
.playlist h3{margin:0 0 10px;font-size:14px;display:flex;align-items:center;}
.playlist h3 .add{margin-left:auto;background:var(--teal);color:#04211d;border:none;border-radius:8px;
  width:30px;height:30px;font-size:18px;cursor:pointer;font-weight:700;line-height:1;}
#songList{list-style:none;margin:0;padding:0;overflow-y:auto;flex:1;}
#songList li{display:flex;align-items:center;gap:8px;padding:9px 6px;border-radius:8px;cursor:pointer;font-size:13px;}
#songList li:active{background:var(--panel2);}
#songList li.playing{background:var(--panel2);border:1px solid var(--pink);}
#songList .mini{width:34px;height:34px;border-radius:6px;background:var(--panel2) center/cover;flex-shrink:0;}
#songList .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.toggle-pl{position:fixed;left:12px;top:66px;z-index:17;background:rgba(20,23,31,.85);border:1px solid var(--line);
  color:var(--text);border-radius:10px;padding:10px 13px;cursor:pointer;font-size:13px;}

/* ===== modal ===== */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:50;align-items:center;justify-content:center;}
.modal.open{display:flex;}
.modal-content{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;
  width:min(430px,94vw);max-height:88vh;overflow-y:auto;}
.modal-content h2{font-family:'Black Han Sans',sans-serif;margin:0 0 14px;font-size:18px;}
.modal-content input[type=text],.modal-content input[type=password],.modal-content textarea{
  width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);
  border-radius:8px;padding:10px;font-size:14px;margin-bottom:10px;font-family:inherit;}
.modal-content textarea{min-height:80px;resize:vertical;}
.filebtn{display:block;width:100%;background:var(--panel2);border:1px dashed var(--line);color:var(--dim);
  border-radius:8px;padding:12px;font-size:13px;cursor:pointer;text-align:center;margin-bottom:10px;}
.filebtn.ok{border-color:var(--teal);color:var(--teal);}
.modal-btns{display:flex;gap:8px;margin-top:6px;}
.modal-btns button{flex:1;padding:12px;border-radius:8px;border:none;cursor:pointer;font-weight:700;}
.btn-save{background:var(--teal);color:#04211d;}
.btn-cancel{background:var(--panel2);color:var(--text);border:1px solid var(--line);}
#uploadStatus{font-size:12px;color:var(--dim);margin-top:10px;min-height:16px;}

/* ===== mobile ===== */
@media(max-width:700px){
  :root{--art-size:56vmin;}
  .topbar h1{font-size:15px;}
  .playlist{width:min(300px,84vw);bottom:130px;}
  .drawer{right:12px;left:auto;width:min(320px,88vw);top:120px;bottom:130px;}
  .option-rail{top:66px;}
  .playerbar{gap:8px;padding:8px 10px;}
  .track-info .t{max-width:34vw;font-size:13px;}
  .vol-wrap{display:none;} /* 모바일은 기기 볼륨 사용 */
  .controls button{font-size:18px;padding:5px;}
  .controls .play{width:42px;height:42px;}
}
</style>
</head>
<body>
<canvas id="vizCanvas"></canvas>
<div id="albumArt" class="shape-circle"></div>
<div id="lyricsBox"></div>

<div class="topbar ui">
  <h1>MUSIC STAGE</h1>
  <a href="index.html">← 추첨 게임</a>
  <button class="hamburger" id="hamburger" aria-label="옵션 열기"><span></span><span></span><span></span></button>
</div>

<button class="toggle-pl ui" id="togglePl">🎵 곡리스트</button>

<div class="playlist hidden" id="playlistPanel">
  <h3>곡리스트 <button class="add" id="addSongBtn" title="곡 추가">+</button></h3>
  <ul id="songList"></ul>
</div>

<div class="option-rail" id="optionRail">
  <button class="opt-chip" data-panel="eq">🎚 이퀄라이저 (50)</button>
  <button class="opt-chip" data-panel="art">💿 앨범아트</button>
  <button class="opt-chip" data-panel="lyrics">📝 가사</button>
  <button class="opt-chip" data-panel="style">🎛 이퀄라이저 조절</button>
  <button class="opt-chip" data-panel="github">🔗 GitHub 연결</button>
</div>

<div class="drawer" id="drawer-eq">
  <h3>이퀄라이저 효과 (50종)</h3>
  <div class="eq-grid" id="eqGrid"></div>
</div>

<div class="drawer" id="drawer-art">
  <h3>앨범아트 설정</h3>
  <label>표시</label>
  <div class="toggle-row">
    <button id="artToggle">앨범아트 켜기/끄기</button>
  </div>
  <label>모양</label>
  <div class="toggle-row" id="artShapes">
    <button data-shape="circle" class="on">⚪ 원형</button>
    <button data-shape="lp">💿 LP형</button>
    <button data-shape="square">⬛ 사각형</button>
  </div>
  <label>회전</label>
  <div class="toggle-row">
    <button id="spinToggle">🔄 회전 켜기/끄기</button>
  </div>
  <div id="artSliders"></div>
</div>

<div class="drawer" id="drawer-lyrics">
  <h3>가사 설정</h3>
  <div class="toggle-row">
    <button id="lyricsToggle">가사 켜기/끄기</button>
  </div>
  <div id="lyricsSliders"></div>
  <p style="font-size:11px;color:var(--dim);">가사는 곡 추가 시 입력할 수 있어요. 싱크 가사는 별도 페이지에서 제작 예정!</p>
</div>

<div class="drawer" id="drawer-style">
  <h3>이퀄라이저 조절</h3>
  <div id="eqSliders"></div>
</div>

<div class="drawer" id="drawer-github">
  <h3>GitHub 연결 (곡 업로드용)</h3>
  <label>저장소명</label>
  <input type="text" id="ghRepo" value="JET-EVENTS" style="width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px;font-size:13px;">
  <label>Personal Access Token</label>
  <input type="password" id="ghPat" placeholder="ghp_..." style="width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px;font-size:13px;">
  <p style="font-size:11px;color:var(--dim);">토큰은 이 브라우저 세션에만 머뭅니다.</p>
  <button class="btn-save" id="ghConnectBtn" style="width:100%;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:700;">연결</button>
  <div id="ghConnStatus" style="font-size:12px;color:var(--dim);margin-top:8px;"></div>
</div>

<div class="modal" id="addModal">
  <div class="modal-content">
    <h2>곡 추가</h2>
    <input type="text" id="songArtist" placeholder="가수">
    <input type="text" id="songTitle" placeholder="제목">
    <label class="filebtn" id="audioLabel">🎵 음악 파일 선택 (mp3 등)
      <input type="file" id="audioFile" accept="audio/*" hidden>
    </label>
    <button class="filebtn" id="repoAudioBtn" style="border-style:solid;">📁 저장소 music 폴더에서 선택</button>
    <div id="repoAudioList" style="display:none;max-height:140px;overflow-y:auto;margin-bottom:10px;"></div>
    <label class="filebtn" id="coverLabel">🖼 자켓 이미지 선택 (선택사항)
      <input type="file" id="coverFile" accept="image/*" hidden>
    </label>
    <button class="filebtn" id="repoCoverBtn" style="border-style:solid;">📁 저장소 covers 폴더에서 선택</button>
    <div id="repoCoverList" style="display:none;max-height:140px;overflow-y:auto;margin-bottom:10px;"></div>
    <textarea id="songLyrics" placeholder="가사 (선택사항)"></textarea>
    <div class="modal-btns">
      <button class="btn-save" id="saveSongBtn">저장 (GitHub 업로드)</button>
      <button class="btn-cancel" id="cancelSongBtn">취소</button>
    </div>
    <div id="uploadStatus"></div>
  </div>
</div>

<div class="playerbar ui">
  <div class="jacket" id="jacket"></div>
  <div class="track-info">
    <div class="t" id="trackTitle">곡을 선택하세요</div>
    <div class="a" id="trackArtist">곡리스트에서 + 로 추가</div>
  </div>
  <div class="controls">
    <button id="prevBtn" title="이전 곡">⏮</button>
    <button class="play" id="playBtn" title="재생/일시정지">▶</button>
    <button id="nextBtn" title="다음 곡">⏭</button>
    <button id="shuffleBtn" title="셔플" style="font-size:15px;opacity:.5;">🔀</button>
    <button id="repeatBtn" title="반복" style="font-size:15px;opacity:.5;">🔁</button>
  </div>
  <div class="progress-wrap">
    <span id="curTime">0:00</span>
    <input type="range" id="seek" min="0" max="100" value="0">
    <span id="durTime">0:00</span>
  </div>
  <div class="vol-wrap">🔊<input type="range" id="vol" min="0" max="100" value="80"></div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
/* ================= state ================= */
let playlist = [];
let currentIdx = -1;
let shuffle=false, repeat=false;
let gh = {owner:null,repo:null,pat:null,connected:false};

const audio = document.getElementById('audio');
const canvas = document.getElementById('vizCanvas');
const ctx = canvas.getContext('2d');
function resize(){
  const dpr = Math.min(devicePixelRatio||1, 2);
  canvas.width = innerWidth*dpr; canvas.height = innerHeight*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
addEventListener('resize', resize); resize();

/* ================= web audio (실제 음원 분석) ================= */
let audioCtx, analyser, srcNode, freqData, timeData;
function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.8;
  srcNode = audioCtx.createMediaElementSource(audio);
  srcNode.connect(analyser);
  analyser.connect(audioCtx.destination);
  freqData = new Uint8Array(analyser.frequencyBinCount);
  timeData = new Uint8Array(analyser.fftSize);
}

/* ================= 50 EQ presets ================= */
const SHAPES=[{key:'bars',name:'바'},{key:'mirror',name:'미러바'},{key:'circle',name:'서클'},{key:'wave',name:'웨이브'},{key:'dots',name:'파티클'}];
const PALETTES=[
  {name:'네온핑크',c:['#FF2E63','#ff7aa0']},{name:'골드',c:['#FFC53D','#ffe29a']},
  {name:'민트',c:['#2DD4BF','#9df3e8']},{name:'바이올렛',c:['#7C83FD','#c3c6ff']},
  {name:'선셋',c:['#FF8A5B','#FF2E63']},{name:'오션',c:['#2DD4BF','#7C83FD']},
  {name:'라임',c:['#B4FF4A','#2DD4BF']},{name:'체리',c:['#F45B69','#FFC53D']},
  {name:'아이스',c:['#9df3e8','#c3c6ff']},{name:'레인보우',c:'rainbow'}
];
const EQ_PRESETS=[];
SHAPES.forEach(s=>PALETTES.forEach(p=>EQ_PRESETS.push({shape:s.key,label:`${s.name}·${p.name}`,pal:p.c})));
let eqIdx=0;
const grid=document.getElementById('eqGrid');
EQ_PRESETS.forEach((p,i)=>{
  const b=document.createElement('button');
  b.textContent=`${String(i+1).padStart(2,'0')} ${p.label}`;
  if(i===0)b.classList.add('sel');
  b.onclick=()=>{eqIdx=i;grid.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
  grid.appendChild(b);
});
function hex(h){h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function palColor(pal,t,a=1){
  if(pal==='rainbow')return`hsla(${(t*360+performance.now()/40)%360},90%,60%,${a})`;
  const x=hex(pal[0]),y=hex(pal[1]),m=Math.max(0,Math.min(1,t));
  return`rgba(${x[0]+(y[0]-x[0])*m|0},${x[1]+(y[1]-x[1])*m|0},${x[2]+(y[2]-x[2])*m|0},${a})`;
}

/* ================= 재사용 화살표 슬라이더 생성기 =================
   모든 조절값: 양쪽 ◀▶ 버튼 + 슬라이더 + 초기화 버튼 */
const params={};
function mkSlider(containerId,key,labelText,min,max,def,step=5,fmt=v=>v+'%'){
  params[key]={val:def,def,min,max};
  const c=document.getElementById(containerId);
  const lab=document.createElement('label');
  const valSpan=document.createElement('span');
  valSpan.className='slider-val';valSpan.id='v-'+key;valSpan.textContent=fmt(def);
  lab.textContent=labelText+' ';lab.appendChild(valSpan);
  const row=document.createElement('div');row.className='arrow-slider';
  const bl=document.createElement('button');bl.textContent='◀';
  const inp=document.createElement('input');inp.type='range';inp.min=min;inp.max=max;inp.value=def;inp.id='s-'+key;
  const br=document.createElement('button');br.textContent='▶';
  const rs=document.createElement('button');rs.className='reset';rs.textContent='초기화';
  function set(v){
    v=Math.max(min,Math.min(max,v));
    params[key].val=v;inp.value=v;valSpan.textContent=fmt(v);
    applyParam(key,v);
  }
  bl.onclick=()=>set(params[key].val-step);
  br.onclick=()=>set(params[key].val+step);
  rs.onclick=()=>set(def);
  inp.oninput=()=>set(+inp.value);
  row.append(bl,inp,br,rs);
  c.append(lab,row);
  applyParam(key,def);
}
function applyParam(key,v){
  const r=document.documentElement.style;
  if(key==='artSize') r.setProperty('--art-size',v+'vmin');
  if(key==='artSpeed') r.setProperty('--art-spin-dur',(60/Math.max(1,v)).toFixed(2)+'s'); /* v=RPM */
  if(key==='artY') document.getElementById('albumArt').style.top=v+'%';
  if(key==='lyrSize') r.setProperty('--lyr-size',v+'px');
  if(key==='lyrY') r.setProperty('--lyr-y',v+'%');
}

/* ================= render loop ================= */
function draw(){
  requestAnimationFrame(draw);
  const W=innerWidth,H=innerHeight;
  ctx.fillStyle=`rgba(10,12,16,${params.dim.val/100*0.35+0.05})`;
  ctx.fillRect(0,0,W,H);
  if(!analyser)return;
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(timeData);
  const p=EQ_PRESETS[eqIdx];
  const sens=params.sens.val/100,scale=params.scale.val/100;
  const cy=H*(params.ypos.val/100);
  const N=innerWidth<700?64:96;
  if(p.shape==='bars'){
    const bw=W/N;
    for(let i=0;i<N;i++){
      const v=freqData[(i*freqData.length/N)|0]/255*sens;
      const h=v*H*0.5*scale;
      ctx.fillStyle=palColor(p.pal,i/N,.9);
      ctx.fillRect(i*bw+1,cy+H*0.25*scale-h,bw-2,h);
    }
  }else if(p.shape==='mirror'){
    const bw=W/N;
    for(let i=0;i<N;i++){
      const v=freqData[(i*freqData.length/N)|0]/255*sens;
      const h=v*H*0.3*scale;
      ctx.fillStyle=palColor(p.pal,i/N,.9);
      ctx.fillRect(i*bw+1,cy-h,bw-2,h);
      ctx.fillStyle=palColor(p.pal,i/N,.35);
      ctx.fillRect(i*bw+1,cy,bw-2,h*0.6);
    }
  }else if(p.shape==='circle'){
    const cx=W/2,R=Math.min(W,H)*0.16*scale;
    for(let i=0;i<N;i++){
      const v=freqData[(i*freqData.length/N)|0]/255*sens;
      const ang=i/N*Math.PI*2-Math.PI/2;
      const len=v*Math.min(W,H)*0.28*scale;
      ctx.strokeStyle=palColor(p.pal,i/N,.9);ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(cx+Math.cos(ang)*R,cy+Math.sin(ang)*R);
      ctx.lineTo(cx+Math.cos(ang)*(R+len),cy+Math.sin(ang)*(R+len));
      ctx.stroke();
    }
  }else if(p.shape==='wave'){
    ctx.lineWidth=3*scale;ctx.beginPath();
    for(let i=0;i<timeData.length;i+=2){
      const x=i/timeData.length*W;
      const y=cy+(timeData[i]-128)/128*H*0.25*scale*sens;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle=palColor(p.pal,.5,.95);ctx.stroke();
  }else if(p.shape==='dots'){
    for(let i=0;i<N;i++){
      const v=freqData[(i*freqData.length/N)|0]/255*sens;
      const x=i/N*W+W/N/2;
      const y=cy-v*H*0.4*scale+Math.sin(performance.now()/300+i)*6;
      ctx.fillStyle=palColor(p.pal,i/N,.9);
      ctx.beginPath();ctx.arc(x,y,2+v*9*scale,0,Math.PI*2);ctx.fill();
    }
  }
}
draw();

/* ================= auto-hide UI (3초) ================= */
let hideTimer=null;
function anyPanelOpen(){
  return document.querySelector('.drawer.show')||document.querySelector('.modal.open')
    ||!document.getElementById('playlistPanel').classList.contains('hidden')
    ||document.getElementById('optionRail').classList.contains('show');
}
function showUI(){
  document.body.classList.remove('ui-hidden');
  clearTimeout(hideTimer);
  hideTimer=setTimeout(()=>{
    if(!anyPanelOpen()&&!audio.paused) document.body.classList.add('ui-hidden');
  },3000);
}
['pointerdown','pointermove','touchstart','keydown'].forEach(ev=>
  addEventListener(ev,showUI,{passive:true}));
showUI();

/* ================= hamburger & drawers ================= */
const hamburger=document.getElementById('hamburger');
const rail=document.getElementById('optionRail');
hamburger.onclick=()=>{
  hamburger.classList.toggle('open');
  rail.classList.toggle('show');
  if(!rail.classList.contains('show'))closeDrawers();
};
function closeDrawers(){
  document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('show'));
  document.querySelectorAll('.opt-chip').forEach(c=>c.classList.remove('active'));
}
document.querySelectorAll('.opt-chip').forEach(chip=>{
  chip.onclick=()=>{
    const t=document.getElementById('drawer-'+chip.dataset.panel);
    const was=t.classList.contains('show');
    closeDrawers();
    if(!was){t.classList.add('show');chip.classList.add('active');}

});

/* ================= playlist ================= */
document.getElementById('togglePl').onclick=()=>{
  document.getElementById('playlistPanel').classList.toggle('hidden');
};
function renderPlaylist(){
  const ul=document.getElementById('songList');
  ul.innerHTML='';
  if(playlist.length===0){
    ul.innerHTML='<li style="color:var(--dim);cursor:default;">+ 버튼으로 곡을 추가하세요</li>';
    return;
  }
  playlist.forEach((s,i)=>{
    const li=document.createElement('li');
    if(i===currentIdx)li.classList.add('playing');
    const mini=document.createElement('div');mini.className='mini';
    if(s.coverUrl)mini.style.backgroundImage=`url(${s.coverUrl})`;
    const nm=document.createElement('span');nm.className='nm';
    nm.textContent=`${s.artist} - ${s.title}`;
    li.append(mini,nm);
    li.onclick=()=>playIndex(i);
    ul.appendChild(li);
  });
}

/* ================= player controls ================= */
const playBtn=document.getElementById('playBtn');
function playIndex(i){
  if(i<0||i>=playlist.length)return;
  currentIdx=i;
  const s=playlist[i];
  audio.src=s.audioUrl;
  document.getElementById('trackTitle').textContent=s.title;
  document.getElementById('trackArtist').textContent=s.artist;
  document.getElementById('jacket').style.backgroundImage=s.coverUrl?`url(${s.coverUrl})`:'none';
  initAudio();audioCtx.resume();
  audio.play();
  renderPlaylist();updateArt();updateLyrics();
  if('mediaSession'in navigator){
    navigator.mediaSession.metadata=new MediaMetadata({title:s.title,artist:s.artist,
      artwork:s.coverUrl?[{src:s.coverUrl}]:[]});
    navigator.mediaSession.setActionHandler('previoustrack',()=>document.getElementById('prevBtn').click());
    navigator.mediaSession.setActionHandler('nexttrack',nextTrack);
  }
}
playBtn.onclick=()=>{
  if(currentIdx<0){if(playlist.length)playIndex(0);return;}
  initAudio();audioCtx.resume();
  audio.paused?audio.play():audio.pause();
};
audio.onplay=()=>{playBtn.textContent='⏸';updateArt();showUI();};
audio.onpause=()=>{playBtn.textContent='▶';updateArt();document.body.classList.remove('ui-hidden');};
document.getElementById('nextBtn').onclick=nextTrack;
document.getElementById('prevBtn').onclick=()=>{
  if(audio.currentTime>3){audio.currentTime=0;return;}
  playIndex((currentIdx-1+playlist.length)%playlist.length);
};
function nextTrack(){
  if(!playlist.length)return;
  if(shuffle){playIndex(Math.floor(Math.random()*playlist.length));return;}
  playIndex((currentIdx+1)%playlist.length);
}
audio.onended=()=>{repeat?(audio.currentTime=0,audio.play()):nextTrack();};
document.getElementById('shuffleBtn').onclick=e=>{shuffle=!shuffle;e.target.style.opacity=shuffle?1:.5;};
document.getElementById('repeatBtn').onclick=e=>{repeat=!repeat;e.target.style.opacity=repeat?1:.5;};
const seek=document.getElementById('seek');
audio.ontimeupdate=()=>{
  if(audio.duration)seek.value=audio.currentTime/audio.duration*100;
  document.getElementById('curTime').textContent=fmt(audio.currentTime);
  document.getElementById('durTime').textContent=fmt(audio.duration||0);
};
seek.oninput=()=>{if(audio.duration)audio.currentTime=seek.value/100*audio.duration;};
document.getElementById('vol').oninput=e=>audio.volume=e.target.value/100;
audio.volume=.8;
function fmt(t){t=t|0;return`${t/60|0}:${String(t%60).padStart(2,'0')}`;}

addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.code==='Space'){e.preventDefault();playBtn.click();}
  if(e.code==='ArrowRight')audio.currentTime+=5;
  if(e.code==='ArrowLeft')audio.currentTime-=5;
  if(e.code==='KeyE'){eqIdx=(eqIdx+1)%EQ_PRESETS.length;
    grid.querySelectorAll('button').forEach((b,i)=>b.classList.toggle('sel',i===eqIdx));}
});

/* ================= add song ================= */
let pendingAudio=null,pendingCover=null;
let repoAudioUrl=null,repoCoverUrl=null; // 저장소 폴더에서 선택한 경우

/* 저장소 폴더 브라우징 (PAT 없이도 public repo는 조회 가능) */
const DEFAULT_OWNER='jetseo', DEFAULT_REPO='JET-EVENTS';
async function listRepoDir(dir){
  const owner=gh.owner||DEFAULT_OWNER, repo=gh.repo||DEFAULT_REPO;
  const headers=gh.connected?{Authorization:`token ${gh.pat}`}:{};
  const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${dir}`,{headers});
  if(!r.ok)return[];
  return(await r.json()).filter(f=>f.type==='file');
}
function parseArtistTitle(filename){
  const base=filename.replace(/\.[^.]+$/,'');
  const m=base.split(' - ');
  return m.length>=2?{artist:m[0].trim(),title:m.slice(1).join(' - ').trim()}:{artist:'',title:base};
}
async function showRepoList(dir,listElId,onPick){
  const el=document.getElementById(listElId);
  if(el.style.display==='block'){el.style.display='none';return;}
  el.style.display='block';
  el.innerHTML='<div style="font-size:12px;color:var(--dim);padding:6px;">불러오는 중...</div>';
  const files=await listRepoDir(dir);
  if(!files.length){el.innerHTML='<div style="font-size:12px;color:var(--dim);padding:6px;">폴더가 비어있거나 접근 불가</div>';return;}
  el.innerHTML='';
  files.forEach(f=>{
    const b=document.createElement('button');
    b.className='filebtn';b.style.marginBottom='4px';b.style.padding='8px';b.style.fontSize='12px';
    b.textContent=f.name;
    b.onclick=()=>{onPick(f);el.style.display='none';};
    el.appendChild(b);
  });
}
document.getElementById('repoAudioBtn').onclick=()=>showRepoList('music','repoAudioList',f=>{
  repoAudioUrl=f.download_url;pendingAudio=null;
  document.getElementById('audioLabel').classList.add('ok');
  document.getElementById('audioLabel').firstChild.textContent='📁 '+f.name;
  const {artist,title}=parseArtistTitle(f.name);
  if(artist&&!document.getElementById('songArtist').value)document.getElementById('songArtist').value=artist;
  if(title&&!document.getElementById('songTitle').value)document.getElementById('songTitle').value=title;
});
document.getElementById('repoCoverBtn').onclick=()=>showRepoList('covers','repoCoverList',f=>{
  repoCoverUrl=f.download_url;pendingCover=null;
  document.getElementById('coverLabel').classList.add('ok');
  document.getElementById('coverLabel').firstChild.textContent='📁 '+f.name;
});

document.getElementById('addSongBtn').onclick=()=>document.getElementById('addModal').classList.add('open');
document.getElementById('cancelSongBtn').onclick=()=>document.getElementById('addModal').classList.remove('open');
document.getElementById('audioFile').onchange=e=>{
  pendingAudio=e.target.files[0]||null;repoAudioUrl=null;
  document.getElementById('audioLabel').classList.toggle('ok',!!pendingAudio);
  if(pendingAudio)document.getElementById('audioLabel').firstChild.textContent='🎵 '+pendingAudio.name;
};
document.getElementById('coverFile').onchange=e=>{
  pendingCover=e.target.files[0]||null;repoCoverUrl=null;
  document.getElementById('coverLabel').classList.toggle('ok',!!pendingCover);
  if(pendingCover)document.getElementById('coverLabel').firstChild.textContent='🖼 '+pendingCover.name;
};
document.getElementById('saveSongBtn').onclick=async()=>{
  const artist=document.getElementById('songArtist').value.trim();
  const title=document.getElementById('songTitle').value.trim();
  const lyrics=document.getElementById('songLyrics').value.trim();
  const st=document.getElementById('uploadStatus');
  if(!artist||!title||(!pendingAudio&&!repoAudioUrl)){st.textContent='가수, 제목, 음악 파일(또는 폴더 선택)은 필수예요.';return;}
  const song={artist,title,lyrics,
    audioUrl:repoAudioUrl||URL.createObjectURL(pendingAudio),
    coverUrl:repoCoverUrl||(pendingCover?URL.createObjectURL(pendingCover):null),
    local:!repoAudioUrl&&!gh.connected};
  if(gh.connected){
    try{
      st.textContent='GitHub 업로드 중... (파일 크기에 따라 시간이 걸려요)';
      const base=`${artist} - ${title}`.replace(/[\\/:*?"<>|#%]/g,'_');
      if(pendingAudio){ // 새 로컬 파일만 업로드, 폴더에서 고른 건 이미 저장소에 있음
        const aExt=(pendingAudio.name.split('.').pop()||'mp3');
        const aPath=`music/${base}.${aExt}`;
        await ghUpload(aPath,pendingAudio,`곡 추가: ${base}`);
        song.audioUrl=rawUrl(aPath);
      }
      if(pendingCover){
        const cExt=(pendingCover.name.split('.').pop()||'jpg');
        const cPath=`covers/${base}.${cExt}`;
        await ghUpload(cPath,pendingCover,`자켓 추가: ${base}`);
        song.coverUrl=rawUrl(cPath);
      }
      song.local=false;
      playlist.push(song);
      await savePlaylistJson();
      st.textContent='✅ 저장 완료!';
    }catch(err){
      st.textContent='❌ 업로드 실패: '+err.message+' (로컬 재생용으로만 추가됨)';
      playlist.push(song);
    }
  }else{
    playlist.push(song);
    st.textContent=repoAudioUrl?'저장소 곡으로 추가됨 (playlist.json 갱신은 GitHub 연결 필요)':'GitHub 미연결 → 이 세션에만 추가됨';
  }
  renderPlaylist();
  setTimeout(()=>{
    document.getElementById('addModal').classList.remove('open');
    st.textContent='';
    ['songArtist','songTitle','songLyrics'].forEach(id=>document.getElementById(id).value='');
    pendingAudio=pendingCover=null;repoAudioUrl=repoCoverUrl=null;
    document.getElementById('audioLabel').classList.remove('ok');
    document.getElementById('coverLabel').classList.remove('ok');
    document.getElementById('audioLabel').firstChild.textContent='🎵 음악 파일 선택 (mp3 등)';
    document.getElementById('coverLabel').firstChild.textContent='🖼 자켓 이미지 선택 (선택사항)';
  },1400);
};

/* ================= github ================= */
function rawUrl(p){return`https://raw.githubusercontent.com/${gh.owner}/${gh.repo}/main/${encodeURI(p)}`;}
document.getElementById('ghConnectBtn').onclick=async()=>{
  const repo=document.getElementById('ghRepo').value.trim();
  const pat=document.getElementById('ghPat').value.trim();
  const st=document.getElementById('ghConnStatus');
  if(!repo||!pat){st.textContent='저장소명과 PAT를 입력하세요';return;}
  st.textContent='확인 중...';
  try{
    const r=await fetch('https://api.github.com/user',{headers:{Authorization:`token ${pat}`}});
    if(!r.ok)throw new Error('토큰 인증 실패');
    const u=await r.json();
    gh={owner:u.login,repo,pat,connected:true};
    st.textContent=`✅ ${u.login}/${repo} 연결됨`;
    await loadPlaylistJson();
  }catch(e){st.textContent='❌ '+e.message;gh.connected=false;}
};
function fileToB64(f){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;r.readAsDataURL(f);
  });
}
async function ghGetSha(p){
  const r=await fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${encodeURI(p)}`,
    {headers:{Authorization:`token ${gh.pat}`}});
  if(r.ok)return(await r.json()).sha;
  return null;
}
async function ghUpload(p,fileOrText,message){
  const content=typeof fileOrText==='string'
    ?btoa(unescape(encodeURIComponent(fileOrText)))
    :await fileToB64(fileOrText);
  const sha=await ghGetSha(p);
  const r=await fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/${encodeURI(p)}`,{
    method:'PUT',
    headers:{Authorization:`token ${gh.pat}`,'Content-Type':'application/json'},
    body:JSON.stringify({message,content,...(sha&&{sha})})
  });
  if(!r.ok){
    const err=await r.json().catch(()=>({}));
    throw new Error(err.message||('HTTP '+r.status));
  }
}
async function savePlaylistJson(){
  const data=playlist.filter(s=>!s.local).map(({artist,title,audioUrl,coverUrl,lyrics})=>({artist,title,audioUrl,coverUrl,lyrics}));
  await ghUpload('playlist.json',JSON.stringify(data,null,2),'플레이리스트 업데이트');
}
async function loadPlaylistJson(){
  try{
    const r=await fetch(`https://api.github.com/repos/${gh.owner}/${gh.repo}/contents/playlist.json`,
      {headers:{Authorization:`token ${gh.pat}`}});
    if(!r.ok)return;
    const d=await r.json();
    const arr=JSON.parse(decodeURIComponent(escape(atob(d.content))));
    arr.forEach(s=>{
      if(!playlist.some(p=>p.artist===s.artist&&p.title===s.title))playlist.push(s);
    });
    renderPlaylist();
  }catch(e){console.warn('playlist load',e);}
}
(async()=>{
  try{
    const r=await fetch('playlist.json?'+Date.now());
    if(r.ok){
      const arr=await r.json();
      arr.forEach(s=>playlist.push(s));
      renderPlaylist();
    }
  }catch(e){}
})();
renderPlaylist();
</script>
